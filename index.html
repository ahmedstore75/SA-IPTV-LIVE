<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SA IPTV LIVE - Global OTT Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL MODERN RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #080a10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-top: 83px; 
        }

        /* --- GLOBAL TOP HEADER --- */
        header {
            background: #0f121d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e2538;
            height: 55px;
            gap: 15px;
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            z-index: 1000000; 
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #4634ff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(70, 52, 255, 0.4);
            white-space: nowrap;
        }

        .logo span { color: #fff; }

        .download-btn {
            background: linear-gradient(135deg, #4634ff, #796cff);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(70, 52, 255, 0.3);
            margin-left: auto;
        }

        /* --- RUNNING NOTICE BAR --- */
        .notice-bar {
            background: linear-gradient(90deg, #121624, #0f121d);
            color: #fff;
            display: flex !important; 
            align-items: center;
            border-bottom: 1px solid #1e2538;
            font-size: 11px; 
            font-weight: 500;
            height: 28px; 
            overflow: hidden;
            position: fixed; 
            top: 55px; 
            left: 0;
            width: 100vw;
            z-index: 999999 !important; 
        }

        .notice-title {
            background: #ff3838;
            color: #ffffff;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 700;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 5px 0 12px rgba(0,0,0,0.5);
            font-size: 11px;
        }

        .notice-marquee {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .notice-container {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        .notice-container span {
            margin-right: 60px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- GLOBAL LAYOUT CONTAINER --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #080a10;
            height: calc(100vh - 83px); 
        }

        /* --- LEFT SIDE: PLAYER --- */
        .player-section {
            flex: 2.4; 
            display: flex;
            flex-direction: column;
            background: #080a10;
            position: relative;
            padding: 15px;
        }

        .video-wrapper {
            flex: 1;
            width: 100%;
            height: 100%; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(70, 52, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); 
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
            display: block;
        }

        /* --- OVERLAY NAVIGATION BUTTONS --- */
        .nav-overlay-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 18, 29, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2147483647 !important; 
            pointer-events: none;
            opacity: 0; 
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            font-size: 16px;
        }

        .nav-overlay-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-overlay-btn:hover {
            background: #4634ff;
            border-color: #4634ff;
            box-shadow: 0 0 15px rgba(70, 52, 255, 0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* --- CUSTOM CONTROLS LOWER BAR --- */
        .custom-player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 25px 20px 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 2147483647 !important;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .custom-player-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .control-btn:hover { color: #4634ff; }
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 70px; accent-color: #4634ff; cursor: pointer; }

        .stream-info {
            background: #0f121d;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e2538;
            height: 48px;
            margin-top: 12px;
            border-radius: 8px;
        }

        .now-playing h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- RIGHT SIDE: PLAYLIST PANEL --- */
        .playlist-section {
            flex: 0.8; 
            background: #0f121d;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1e2538;
            position: relative;
        }

        .search-box {
            padding: 12px;
            background: #131826;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 8px;
            border-bottom: 1px solid #1e2538;
        }

        .category-dropdown-btn {
            width: 100%;
            padding: 8px 12px;
            background: #080a10;
            border: 1px solid #222c41;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #556585; font-size: 12px; }
        .search-box input { width: 100%; padding: 8px 12px 8px 34px; background: #080a10; border: 1px solid #222c41; border-radius: 6px; color: #fff; outline: none; font-size: 12px; }

        .category-menu {
            position: absolute; top: 55px; left: 12px; right: 12px; background: #131826; border: 1px solid #222c41; border-radius: 6px; max-height: 250px; overflow-y: auto; z-index: 100; display: none; padding: 4px;
        }
        .category-menu.show { display: block; }
        .category-item { padding: 8px 12px; font-size: 12px; color: #cbd5e1; cursor: pointer; border-radius: 4px; }
        .category-item:hover, .category-item.active { background: #4634ff; color: #fff; }

        /* --- CHANNEL GRID --- */
        .channel-list {
            flex: 1; overflow-y: auto; padding: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-content: start;
        }

        .channel-item {
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 110px; background: linear-gradient(145deg, #130e21 0%, #0a0712 100%); border: 1px solid rgba(139, 92, 246, 0.15); border-radius: 14px; cursor: pointer; overflow: hidden; padding: 14px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); content-visibility: auto; contain-intrinsic-size: 110px;
        }
        .channel-item:hover { border-color: rgba(139, 92, 246, 0.4); }
        .channel-item.active { border: 1.5px solid #00ffaa !important; box-shadow: 0 0 22px rgba(0, 255, 170, 0.75) !important; }

        .channel-logo { width: 100%; height: 48px; object-fit: contain; background: transparent; display: block; margin: 0 auto; filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.6)); }
        .fav-heart { position: absolute; top: 8px; right: 8px; font-size: 11px; color: rgba(255, 255, 255, 0.35); padding: 4px; }
        .fav-heart.active-fav { color: #ff3860 !important; }

        .channel-name { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #0a0712 0%, rgba(10, 7, 18, 0.85) 75%); font-size: 10.5px; font-weight: 600; color: #cbd5e1; padding: 20px 6px 6px 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .channel-item.active .channel-name { color: #00ffaa; }
        .live-dot { position: absolute; top: 10px; left: 10px; width: 6px; height: 6px; background-color: #ff3838; border-radius: 50%; box-shadow: 0 0 8px #ff3838; }

        /* --- RESPONSIVE FOR MOBILE PORTRAIT --- */
        @media (max-width: 900px) and (orientation: portrait) {
            body { overflow: auto; padding-top: 83px; }
            .main-container { flex-direction: column; height: auto; }
            .player-section { flex: none; width: 100%; aspect-ratio: 16 / 9; padding: 10px; }
            .playlist-section { flex: none; height: 60vh; border-left: none; border-top: 1px solid #1e2538; }
            .channel-list { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .channel-item { height: 95px; border-radius: 10px; padding: 10px; contain-intrinsic-size: 95px; }
            .channel-logo { height: 40px; }
        }

        /* --- 🔥 RESPONSIVE FOR MOBILE LANDSCAPE (FIXED FULLSCREEN/FIT) 🔥 --- */
        @media (max-width: 950px) and (orientation: landscape) {
            body { overflow: hidden !important; height: 100vh !important; width: 100vw !important; padding-top: 0 !important; }
            header, .stream-info, .playlist-section, .notice-bar { display: none !important; }
            
            .main-container { height: 100vh !important; width: 100vw !important; }
            .player-section { flex: 1 !important; height: 100vh !important; width: 100vw !important; padding: 0 !important; margin: 0 !important; }
            
            /* ভিডিও র‍্যাপার পুরো স্ক্রিনে ফিট করা হলো */
            .video-wrapper { height: 100vh !important; width: 100vw !important; border-radius: 0 !important; border: none !important; }
            
            /* ⚡ ভিডিও যাতে কোনো কালো বর্ডার ছাড়া একদম ডিসপ্লে ফিট হয়ে ছড়ায় ⚡ */
            video { 
                width: 100vw !important; 
                height: 100vh !important; 
                object-fit: cover !important; /* স্ক্রিন ফিট নিশ্চিত করতে কভার করা হলো */
                background: #000;
            }
            
            .nav-overlay-btn { width: 60px; height: 60px; font-size: 22px; background: rgba(15, 18, 29, 0.9); border: 1px solid rgba(255, 255, 255, 0.3); }
            .nav-prev { left: 35px; }
            .nav-next { right: 35px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-circle-play" style="color: #4634ff;"></i> SA <span>IPTV LIVE</span>
        </div>
        <a href="https://upload.app/download/sa-iptv-live/saiptv.live/79ac05ab30ab537097139b35eab853573cef5e736ff078c973ec0e6c8416627c" target="_blank" class="download-btn">
            <i class="fa-solid fa-download"></i> Download
        </a>
        <div class="status-badge" id="totalChannels">0 Channels</div>
    </header>

    <div class="notice-bar">
        <div class="notice-title"><i class="fa-solid fa-bell"></i> নোটিশ:</div>
        <div class="notice-marquee">
            <div class="notice-container">
                <span><i class="fa-solid fa-triangle-exclamation" style="color:#ff3838;"></i> বাফারিং এড়াতে ইন্টারনেট কানেকশন ৫ Mbps বা তার বেশি রাখুন।</span>
                <span><i class="fa-solid fa-bullhorn" style="color:#4634ff;"></i> স্বাগতম SA IPTV LIVE প্লেয়ারে! এখানে পাবেন লাইভ টিভি ফ্রি।</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="player-section">
            <div class="video-wrapper" id="videoWrapper">
                <button class="nav-overlay-btn nav-prev" id="prevChannelBtn" title="Previous Channel"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="nav-overlay-btn nav-next" id="nextChannelBtn" title="Next Channel"><i class="fa-solid fa-chevron-right"></i></button>
                
                <video id="videoPlayer" playsinline></video>

                <div class="custom-player-controls" id="customControls">
                    <button class="control-btn" id="playPauseBtn"><i class="fa-solid fa-pause"></i></button>
                    <div class="volume-container">
                        <button class="control-btn" id="muteBtn"><i class="fa-solid fa-volume-high"></i></button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                    </div>
                    <!-- ফিট স্ক্রিন/ফুলস্ক্রিন টগল বাটন -->
                    <button class="control-btn" id="fullscreenBtn" style="margin-left: auto;" title="Fit Screen/Fullscreen"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>
            
            <div class="stream-info">
                <div class="now-playing">
                    <h3 id="currentChannelName"><i class="fa-solid fa-satellite-dish" style="color:#4634ff;"></i> No Channel Selected</h3>
                </div>
                <div class="player-controls-right">
                    <div class="status-badge" id="playerStatus">Ready</div>
                </div>
            </div>
        </div>

        <div class="playlist-section">
            <div class="search-box">
                <button class="category-dropdown-btn" id="categoryBtn">
                    <span id="selectedCategoryText"><i class="fa-solid fa-layer-group"></i> All Categories</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchChannel" placeholder="Search channel...">
                </div>
            </div>
            <div class="category-menu" id="categoryMenu"></div>
            <div class="channel-list" id="channelContainer"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById("videoPlayer");
        const searchInput = document.getElementById("searchChannel");
        const channelContainer = document.getElementById("channelContainer");
        const categoryBtn = document.getElementById("categoryBtn");
        const categoryMenu = document.getElementById("categoryMenu");
        const selectedCategoryText = document.getElementById("selectedCategoryText");
        const currentChannelName = document.getElementById("currentChannelName");
        const playerStatus = document.getElementById("playerStatus");
        const totalChannelsBadge = document.getElementById("totalChannels");
        
        const videoWrapper = document.getElementById("videoWrapper");
        const prevChannelBtn = document.getElementById("prevChannelBtn");
        const nextChannelBtn = document.getElementById("nextChannelBtn");
        const customControls = document.getElementById("customControls");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const muteBtn = document.getElementById("muteBtn");
        const volumeSlider = document.getElementById("volumeSlider");
        const fullscreenBtn = document.getElementById("fullscreenBtn");

        let hlsPlayer;
        let allChannels = [];
        let currentFilteredChannels = []; 
        let currentChannelIndex = 0; 
        let selectedCategory = "All";
        let favoriteChannels = JSON.parse(localStorage.getItem("sa_iptv_favorites")) || [];
        let hideControlsTimeout; 
        
        const m3uUrl = "https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u";
        const defaultLogo = "https://cdn-icons-png.flaticon.com/512/716/716429.png";

        function showPlayerUI() {
            clearTimeout(hideControlsTimeout);
            prevChannelBtn.classList.add("visible");
            nextChannelBtn.classList.add("visible");
            customControls.classList.add("visible");
            
            hideControlsTimeout = setTimeout(() => {
                prevChannelBtn.classList.remove("visible");
                nextChannelBtn.classList.remove("visible");
                customControls.classList.remove("visible");
            }, 3000); 
        }

        videoWrapper.addEventListener("mousemove", showPlayerUI);
        videoWrapper.addEventListener("click", showPlayerUI);
        videoWrapper.addEventListener("touchstart", showPlayerUI, {passive: true});

        playPauseBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        });

        muteBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
        });
        volumeSlider.addEventListener("input", (e) => {
            video.volume = e.target.value;
            video.muted = false;
            muteBtn.innerHTML = video.volume == 0 ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
        });

        // ফুলস্ক্রিন ও জেনুইন ফিট অ্যাসপেক্ট রেশিও টগল লজিক
        fullscreenBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                if(videoWrapper.requestFullscreen) {
                    videoWrapper.requestFullscreen();
                } else if(videoWrapper.webkitRequestFullscreen) {
                    videoWrapper.webkitRequestFullscreen(); // Safari/iOS
                }
                fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
            } else {
                if(document.exitFullscreen) {
                    document.exitFullscreen();
                }
                fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") switchChannel("next");
            if (e.key === "ArrowLeft") switchChannel("prev");
        });

        categoryBtn.addEventListener("click", (e) => { e.stopPropagation(); categoryMenu.classList.toggle("show"); });
        document.addEventListener("click", () => { categoryMenu.classList.remove("show"); });

        async function fetchPlaylist() {
            channelContainer.innerHTML = "Loading...";
            try {
                const response = await fetch(m3uUrl);
                const data = await response.text();
                const lines = data.split("\n");
                allChannels = [];
                let currentName = "", currentLogo = "", currentCategory = "Others", isPlaylistStarted = false;

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith("#EXTM3U")) { isPlaylistStarted = true; continue; }
                    if (!isPlaylistStarted) continue; 

                    if (line.startsWith("#EXTINF")) {
                        currentName = line.split(",")[1] || "Unknown Channel";
                        let logoMatch = line.match(/tvg-logo="(.*?)"/);
                        currentLogo = logoMatch ? logoMatch[1] : "";
                        let groupMatch = line.match(/group-title="(.*?)"/);
                        currentCategory = groupMatch ? groupMatch[1] : "Others";
                    } else if (line.startsWith("http")) {
                        allChannels.push({
                            id: btoa(unescape(encodeURIComponent(currentName + line.substring(line.length - 10)))), 
                            name: currentName, logo: currentLogo, category: currentCategory, url: line
                        });
                    }
                }

                if (totalChannelsBadge) totalChannelsBadge.innerHTML = `<i class="fa-solid fa-list"></i> ${allChannels.length}`;
                if (allChannels.length > 0) {
                    renderCategories();
                    filterAndRender();
                    playStream(currentFilteredChannels[0].url, currentFilteredChannels[0].name);
                }
            } catch (error) {
                playerStatus.innerHTML = "Failed to load";
            }
        }

        function renderCategories() {
            categoryMenu.innerHTML = "";
            const uniqueCategories = [...new Set(allChannels.map(ch => ch.category))];
            const categories = ["All", "❤️ Favorites", ...uniqueCategories];
            categories.forEach(category => {
                const div = document.createElement("div");
                div.className = `category-item ${category === selectedCategory ? 'active' : ''}`;
                div.textContent = category;
                div.onclick = () => { selectedCategory = category; selectedCategoryText.innerHTML = `<i class="fa-solid fa-layer-group"></i> ${category}`; filterAndRender(); };
                categoryMenu.appendChild(div);
            });
        }

        function filterAndRender() {
            const query = searchInput ? searchInput.value.toLowerCase() : "";
            currentFilteredChannels = allChannels.filter(ch => {
                let matchesCategory = selectedCategory === "All" || (selectedCategory === "❤️ Favorites" ? favoriteChannels.includes(ch.id) : ch.category === selectedCategory);
                return matchesCategory && ch.name.toLowerCase().includes(query);
            });
            renderChannels(currentFilteredChannels);
        }

        function renderChannels(channels) {
            channelContainer.innerHTML = "";
            channels.forEach((channel, index) => {
                const div = document.createElement("div");
                div.className = `channel-item ${index === currentChannelIndex ? 'active' : ''}`;
                div.setAttribute("data-id", channel.id);
                let imgLogo = channel.logo ? channel.logo : defaultLogo;
                let isFav = favoriteChannels.includes(channel.id) ? "fa-solid active-fav" : "fa-regular";

                div.innerHTML = `
                    <div class="live-dot"></div>
                    <i class="${isFav} fa-heart fav-heart"></i>
                    <img class="channel-logo" src="${imgLogo}" onerror="this.src='${defaultLogo}';">
                    <div class="channel-name">${channel.name}</div>
                `;
                div.onclick = () => { currentChannelIndex = index; highlightActive(); playStream(channel.url, channel.name); };
                channelContainer.appendChild(div);
            });
        }

        function highlightActive() {
            document.querySelectorAll('.channel-item').forEach((el, idx) => {
                if(idx === currentChannelIndex) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function switchChannel(direction, event) {
            if(event) event.stopPropagation(); 
            if (currentFilteredChannels.length === 0) return;

            if (direction === "next") {
                currentChannelIndex = (currentChannelIndex + 1) % currentFilteredChannels.length;
            } else if (direction === "prev") {
                currentChannelIndex = (currentChannelIndex - 1 + currentFilteredChannels.length) % currentFilteredChannels.length;
            }

            const targetChannel = currentFilteredChannels[currentChannelIndex];
            playStream(targetChannel.url, targetChannel.name);
            highlightActive();
            showPlayerUI();
        }

        nextChannelBtn.addEventListener("click", (e) => switchChannel("next", e));
        prevChannelBtn.addEventListener("click", (e) => switchChannel("prev", e));

        function playStream(url, name) {
            currentChannelName.innerHTML = `<i class="fa-solid fa-satellite-dish" style="color:#4634ff;"></i> ${name}`;
            playerStatus.innerHTML = "Connecting...";
            playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';

            if (hlsPlayer) hlsPlayer.destroy();

            if (Hls.isSupported()) {
                hlsPlayer = new Hls({ enableWorker: true });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); playerStatus.innerHTML = "Playing"; });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
                playerStatus.innerHTML = "Playing";
            }
        }

        fetchPlaylist();
    </script>
</body>
</html>
