<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SA IPTV LIVE - Global OTT Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL MODERN RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #060709;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- GLOBAL TOP HEADER --- */
        header {
            background: #0f1115;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1e26;
            height: 55px;
            gap: 15px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #4634ff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(70, 52, 255, 0.4);
            white-space: nowrap;
        }

        .logo span {
            color: #fff;
        }

        /* --- DOWNLOAD BUTTON STYLE --- */
        .download-btn {
            background: linear-gradient(135deg, #4634ff, #796cff);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(70, 52, 255, 0.3);
            margin-left: auto; 
        }

        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(70, 52, 255, 0.5);
            background: linear-gradient(135deg, #3525e6, #6759fa);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* --- RUNNING NOTICE BAR --- */
        .notice-bar {
            background: linear-gradient(90deg, #4634ff, #0f1115);
            color: #fff;
            padding: 5px 0;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(70, 52, 255, 0.15);
            font-size: 11px;
            font-weight: 500;
            height: 28px;
        }

        .notice-container {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        .notice-container span {
            margin-right: 70px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        
        .notice-bar:hover .notice-container {
            animation-play-state: paused;
        }

        /* --- GLOBAL LAYOUT CONTAINER --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #060709;
        }

        /* --- LEFT SIDE: CINEMATIC FULL PLAYER --- */
        .player-section {
            flex: 2.4; 
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-wrapper {
            flex: 1;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
        }

        .stream-info {
            background: #0f1115;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1a1e26;
            height: 45px;
        }

        .now-playing h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            background: rgba(70, 52, 255, 0.15);
            color: #796cff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(70, 52, 255, 0.25);
            white-space: nowrap;
        }

        /* --- RIGHT SIDE: GLOBAL PLAYLIST PANEL --- */
        .playlist-section {
            flex: 0.8; 
            background: #0f1115;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1a1e26;
            position: relative;
        }

        .search-box {
            padding: 12px;
            background: #13171e;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #1a1e26;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 12px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            background: #060709;
            border: 1px solid #222936;
            border-radius: 6px;
            color: #fff;
            outline: none;
            transition: 0.2s;
            font-size: 12px;
        }

        .search-box input:focus {
            border-color: #4634ff;
            box-shadow: 0 0 6px rgba(70, 52, 255, 0.2);
        }

        /* --- CATEGORY DROPDOWN BUTTON --- */
        .category-dropdown-btn {
            width: 100%;
            padding: 8px 12px;
            background: #060709;
            border: 1px solid #222936;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .category-dropdown-btn:hover {
            border-color: #4634ff;
            color: #fff;
        }

        /* --- DYNAMIC CATEGORY MENU --- */
        .category-menu {
            position: absolute;
            top: 95px; 
            left: 12px;
            right: 12px;
            background: #13171e;
            border: 1px solid #222936;
            border-radius: 6px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 4px;
        }

        .category-menu.show {
            display: block;
        }

        .category-item {
            padding: 8px 12px;
            font-size: 12px;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.15s;
        }

        .category-item:hover {
            background: rgba(70, 52, 255, 0.15);
            color: #fff;
        }

        .category-item.active {
            background: #4634ff;
            color: #fff;
            font-weight: 500;
        }

        /* VERTICAL SLIM LIST */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* PREMIUM SLIM ROW DESIGN */
        .channel-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 8px 10px;
            background: #13171e;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            gap: 10px;
        }

        .channel-item:hover {
            background: #1a1f29;
            transform: translateX(3px);
            border-color: rgba(70, 52, 255, 0.3);
        }

        .channel-item.active {
            background: linear-gradient(90deg, rgba(70, 52, 255, 0.2) 0%, #13171e 100%);
            border-color: #4634ff;
        }

        /* FLAT SQUARE LOGO WITH SMOOTH ASYNC OPACITY */
        .channel-logo {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            object-fit: contain;
            background: #060709;
            padding: 1px;
            border: 1px solid #222936;
            flex-shrink: 0;
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }
        
        .channel-logo.loaded {
            opacity: 1;
        }

        .channel-name {
            font-size: 12.5px;
            font-weight: 400;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .channel-item:hover .channel-name {
            color: #ffffff;
        }
        
        .channel-item.active .channel-name {
            color: #4634ff;
            font-weight: 500;
        }

        /* --- GLOBAL MINIMALIST SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #060709;
        }
        ::-webkit-scrollbar-thumb {
            background: #4634ff;
            border-radius: 2px;
        }

        /* --- RESPONSIVE FOR MOBILE PORTRAIT --- */
        @media (max-width: 900px) and (orientation: portrait) {
            body {
                overflow: auto;
            }
            .main-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .player-section {
                flex: none;
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
            }
            .video-wrapper {
                height: 100%;
                width: 100%;
            }
            .playlist-section {
                flex: none;
                height: 60vh;
                border-left: none;
                border-top: 1px solid #1a1e26;
            }
        }

        /* --- RESPONSIVE FOR MOBILE LANDSCAPE --- */
        @media (max-width: 950px) and (orientation: landscape) {
            body {
                overflow: hidden;
                height: 100vh;
                width: 100vw;
            }
            header, .notice-bar, .stream-info, .playlist-section {
                display: none !important; 
            }
            .main-container {
                height: 100vh;
                width: 100vw;
            }
            .player-section {
                flex: 1;
                height: 100vh;
                width: 100vw;
            }
            .video-wrapper {
                height: 100vh;
                width: 100vw;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            video {
                width: 100vw !important;
                height: 100vh !important;
                max-width: 100% !important;
                max-height: 100% !important;
                object-fit: fill !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-circle-play" style="color: #4634ff;"></i> SA <span>IPTV LIVE</span>
        </div>
        <a href="https://upload.app/download/sa-iptv-live/saiptv.live/79ac05ab30ab537097139b35eab853573cef5e736ff078c973ec0e6c8416627c" target="_blank" class="download-btn">
            <i class="fa-solid fa-download"></i> Download
        </a>
        <div class="status-badge" id="totalChannels">0 Channels</div>
    </header>

    <div class="notice-bar">
        <div class="notice-container">
            <span><i class="fa-solid fa-bullhorn" style="color: #00ff88;"></i> স্বাগতম SA IPTV LIVE প্লেয়ারে! এখানে আপনি পাবেন ২৪/৭ লাইভ টিভি, খেলাুধলা, খবর এবং বিনোদন একদম বিনামূল্যে।</span>
            <span><i class="fa-solid fa-star" style="color: #ffdd00;"></i> বাফারিং এড়াতে আপনার internet কানেকশন চেক করুন।</span>
            <span><i class="fa-solid fa-heart" style="color: #ff3333;"></i> আমাদের সাথে থাকার জন্য আপনাকে ধন্যবাদ! এনজয় স্ট্রিমিং।</span>
        </div>
    </div>

    <div class="main-container">
        
        <div class="player-section">
            <div class="video-wrapper">
                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>
            <div class="stream-info">
                <div class="now-playing">
                    <h3 id="currentChannelName"><i class="fa-solid fa-satellite-dish" style="color:#555;"></i> No Channel Selected</h3>
                </div>
                <div class="status-badge" id="playerStatus">Ready</div>
            </div>
        </div>

        <div class="playlist-section">
            <div class="search-box">
                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchChannel" placeholder="Search channel...">
                </div>
                
                <button class="category-dropdown-btn" id="categoryBtn">
                    <span id="selectedCategoryText"><i class="fa-solid fa-layer-group"></i> All Categories</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            
            <div class="category-menu" id="categoryMenu"></div>

            <div class="channel-list" id="channelContainer"></div>
        </div>

    </div>

    <script>
        const video = document.getElementById("videoPlayer");
        const searchInput = document.getElementById("searchChannel");
        const channelContainer = document.getElementById("channelContainer");
        const categoryBtn = document.getElementById("categoryBtn");
        const categoryMenu = document.getElementById("categoryMenu");
        const selectedCategoryText = document.getElementById("selectedCategoryText");
        const currentChannelName = document.getElementById("currentChannelName");
        const playerStatus = document.getElementById("playerStatus");
        const totalChannelsBadge = document.getElementById("totalChannels");

        let hlsPlayer;
        let allChannels = [];
        let selectedCategory = "All";
        
        const m3uUrl = "https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u";
        const defaultLogo = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23222936'><path d='M50 15c-19.3 0-35 15.7-35 35s15.7 35 35 35 35-15.7 35-35-15.7-35-35-35zm-8 48V37l18 13-18 13z'/></svg>";

        categoryBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            categoryMenu.classList.toggle("show");
        });

        document.addEventListener("click", () => {
            categoryMenu.classList.remove("show");
        });

        /* M3U PLAYLIST FETCH & PARSE WITH FIXED SELECTOR */
        async function fetchPlaylist() {
            if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Loading...";
            try {
                const response = await fetch(m3uUrl);
                const data = await response.text();
                const lines = data.split("\n");

                allChannels = [];
                let currentName = "";
                let currentLogo = "";
                let currentCategory = "Others";

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    
                    if (line.includes("#EXTINF")) {
                        currentName = line.split(",")[1] || "Unknown Channel";
                        
                        let logoMatch = line.match(/tvg-logo="(.*?)"/);
                        currentLogo = logoMatch ? logoMatch[1] : "";

                        let groupMatch = line.match(/group-title="(.*?)"/);
                        currentCategory = groupMatch ? groupMatch[1] : "Others";
                    } else if (line.startsWith("http")) {
                        allChannels.push({
                            name: currentName,
                            logo: currentLogo,
                            category: currentCategory,
                            url: line
                        });
                    }
                }

                // এখানে ডাউনলোড বাটন অ্যাড করার পর এরর হওয়া ফিক্স করা হয়েছে
                if (totalChannelsBadge) totalChannelsBadge.innerHTML = `<i class="fa-solid fa-list"></i> ${allChannels.length}`;
                if (playerStatus) playerStatus.innerHTML = "Playlist Loaded";
                
                if(allChannels.length > 0) {
                    renderCategories();
                    filterAndRender();
                    playStream(allChannels[0].url, allChannels[0].name);
                    setTimeout(() => {
                        if(channelContainer && channelContainer.firstChild) channelContainer.firstChild.classList.add('active');
                    }, 100);
                }

            } catch (error) {
                if (playerStatus) playerStatus.innerHTML = "Failed to load";
                console.error("Error loading M3U:", error);
            }
        }

        /* RENDER CATEGORIES */
        function renderCategories() {
            if (!categoryMenu) return;
            categoryMenu.innerHTML = "";
            const categories = ["All", ...new Set(allChannels.map(ch => ch.category))];
            const fragment = document.createDocumentFragment();

            categories.forEach(category => {
                const div = document.createElement("div");
                div.className = `category-item ${category === selectedCategory ? 'active' : ''}`;
                div.textContent = category;

                div.onclick = () => {
                    selectedCategory = category;
                    updateCategoryUI(category);
                    if (searchInput) searchInput.value = ""; 
                    filterAndRender();
                };

                fragment.appendChild(div);
            });
            categoryMenu.appendChild(fragment);
        }

        function updateCategoryUI(category) {
            if (selectedCategoryText) {
                selectedCategoryText.innerHTML = `<i class="fa-solid fa-layer-group"></i> ${category === 'All' ? 'All Categories' : category}`;
            }
            if (categoryMenu) categoryMenu.classList.remove("show");
            
            document.querySelectorAll('.category-item').forEach(el => {
                if(el.textContent === category) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        /* FILTER & RENDER */
        function filterAndRender() {
            const query = searchInput ? searchInput.value.toLowerCase() : "";
            
            const filtered = allChannels.filter(ch => {
                const matchesCategory = selectedCategory === "All" || ch.category === selectedCategory;
                const matchesSearch = ch.name.toLowerCase().includes(query);
                return matchesCategory && matchesSearch;
            });

            renderChannels(filtered);
        }

        /* ASYNC IMAGE HANDLING - NO LAGGING */
        function renderChannels(channels) {
            if (!channelContainer) return;
            channelContainer.innerHTML = "";
            
            if(channels.length === 0) {
                channelContainer.innerHTML = "<div style='text-align:center; padding:20px; color:#555; font-size: 12px;'>No channels found!</div>";
                return;
            }

            const fragment = document.createDocumentFragment();

            channels.forEach((channel) => {
                const div = document.createElement("div");
                div.className = "channel-item";

                div.innerHTML = `
                    <img class="channel-logo" src="${defaultLogo}" data-src="${channel.logo}">
                    <div class="channel-name">${channel.name}</div>
                `;

                div.onclick = () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    playStream(channel.url, channel.name);
                };

                fragment.appendChild(div);
            });

            channelContainer.appendChild(fragment);
            setTimeout(lazyLoadLogos, 50);
        }

        /* BACKGROUND LOGO LOADER */
        function lazyLoadLogos() {
            if (!channelContainer) return;
            const images = channelContainer.querySelectorAll(".channel-logo");
            
            images.forEach(img => {
                const realSrc = img.getAttribute("data-src");
                
                if (!realSrc || realSrc.trim() === "") {
                    img.classList.add("loaded");
                    return;
                }

                const tempImg = new Image();
                tempImg.src = realSrc;

                tempImg.onload = () => {
                    img.src = realSrc;
                    img.classList.add("loaded");
                };

                tempImg.onerror = () => {
                    img.src = defaultLogo;
                    img.classList.add("loaded");
                };
            });
        }

        /* PLAY STREAM FUNCTION */
        function playStream(url, name) {
            if (currentChannelName) currentChannelName.innerHTML = `<i class="fa-solid fa-satellite-dish" style="color:#4634ff;"></i> ${name}`;
            if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> Connecting...";

            if (hlsPlayer) {
                hlsPlayer.destroy();
            }

            if (Hls.isSupported()) {
                hlsPlayer = new Hls({
                    enableWorker: true,
                    maxBufferLength: 30
                });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        if (playerStatus) playerStatus.innerHTML = "Click Play Button";
                    });
                    if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-circle-play' style='color:#00ff88'></i> Playing";
                });

                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal && playerStatus) {
                        playerStatus.innerHTML = "<i class='fa-solid fa-triangle-exclamation' style='color:#ff3333'></i> Error";
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
                if (playerStatus) playerStatus.innerHTML = "Playing";
            }
        }

        if (searchInput) {
            searchInput.addEventListener("input", () => {
                if (searchInput.value.trim() !== "") {
                    selectedCategory = "All";
                    updateCategoryUI("All");
                }
                filterAndRender();
            });
        }

        fetchPlaylist();
    </script>
</body>
</html>
