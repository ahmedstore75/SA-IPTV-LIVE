<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SA IPTV LIVE - Global OTT Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL MODERN RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #080a10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-top: 83px; 
        }

        /* --- GLOBAL TOP HEADER --- */
        header {
            background: #0f121d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e2538;
            height: 55px;
            gap: 15px;
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            z-index: 1000000; 
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #4634ff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(70, 52, 255, 0.4);
            white-space: nowrap;
        }

        .logo span {
            color: #fff;
        }

        .download-btn {
            background: linear-gradient(135deg, #4634ff, #796cff);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(70, 52, 255, 0.3);
            margin-left: auto;
        }

        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(70, 52, 255, 0.5);
            background: linear-gradient(135deg, #3525e6, #6759fa);
        }

        /* --- RUNNING NOTICE BAR --- */
        .notice-bar {
            background: linear-gradient(90deg, #121624, #0f121d);
            color: #fff;
            display: flex !important; 
            align-items: center;
            border-bottom: 1px solid #1e2538;
            font-size: 11px; 
            font-weight: 500;
            height: 28px; 
            overflow: hidden;
            position: fixed; 
            top: 55px; 
            left: 0;
            width: 100vw;
            z-index: 999999 !important; 
        }

        .notice-title {
            background: #ff3838;
            color: #ffffff;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 700;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 5px 0 12px rgba(0,0,0,0.5);
            font-size: 11px;
        }

        .notice-marquee {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .notice-container {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        .notice-container span {
            margin-right: 60px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- GLOBAL LAYOUT CONTAINER --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #080a10;
            height: calc(100vh - 83px); 
        }

        /* --- LEFT SIDE: PLAYER --- */
        .player-section {
            flex: 2.4; 
            display: flex;
            flex-direction: column;
            background: #080a10;
            position: relative;
            padding: 15px;
        }

        .video-wrapper {
            flex: 1;
            width: 100%;
            height: 100%; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(70, 52, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); 
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
            display: block;
        }

        .nav-overlay-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 18, 29, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000050; 
            pointer-events: none;
            opacity: 0; 
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .nav-overlay-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-overlay-btn:hover {
            background: #4634ff;
            border-color: #4634ff;
            box-shadow: 0 0 12px rgba(70, 52, 255, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-prev { left: 15px; }
        .nav-next { right: 15px; }

        .stream-info {
            background: #0f121d;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e2538;
            height: 48px;
            margin-top: 12px;
            border-radius: 8px;
        }

        .now-playing h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            background: rgba(70, 52, 255, 0.15);
            color: #796cff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(70, 52, 255, 0.25);
            white-space: nowrap;
        }

        /* --- RIGHT SIDE: PLAYLIST PANEL --- */
        .playlist-section {
            flex: 0.8; 
            background: #0f121d;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1e2538;
            position: relative;
        }

        .search-box {
            padding: 12px;
            background: #131826;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 8px;
            border-bottom: 1px solid #1e2538;
        }

        .category-dropdown-btn {
            width: 100%;
            padding: 8px 12px;
            background: #080a10;
            border: 1px solid #222c41;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .category-dropdown-btn:hover {
            border-color: #4634ff;
            color: #fff;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #556585;
            font-size: 12px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            background: #080a10;
            border: 1px solid #222c41;
            border-radius: 6px;
            color: #fff;
            outline: none;
            transition: 0.2s;
            font-size: 12px;
        }

        .search-box input:focus {
            border-color: #4634ff;
        }

        .category-menu {
            position: absolute;
            top: 55px; 
            left: 12px;
            right: 12px;
            background: #131826;
            border: 1px solid #222c41;
            border-radius: 6px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 4px;
        }

        .category-menu.show { display: block; }

        .category-item {
            padding: 8px 12px;
            font-size: 12px;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.15s;
        }

        .category-item:hover {
            background: rgba(70, 52, 255, 0.15);
            color: #fff;
        }

        .category-item.active {
            background: #4634ff;
            color: #fff;
        }

        /* --- 🔥 HIGH-PERFORMANCE NO-ZOOM CHANNEL GRID 🔥 --- */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            align-content: start;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 👑 সবচাইতে সুন্দর ও প্রিমিয়াম ওটিটি থিম (Deep Night Purple) 👑 */
        .channel-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 110px;
            background: linear-gradient(145deg, #130e21 0%, #0a0712 100%); 
            border: 1px solid rgba(139, 92, 246, 0.15); 
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; 
            overflow: hidden;
            padding: 14px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            
            content-visibility: auto;
            contain-intrinsic-size: 110px; 
        }

        .channel-item:hover {
            background: linear-gradient(145deg, #1d1533 0%, #0f0b1c 100%);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.15);
            z-index: 5;
        }
        
        /* 🔥 প্লে হওয়া একটিভ চ্যানেলে চমৎকার গ্লোয়িং নিয়ন সায়ান লাইٹنگ 🔥 */
        .channel-item.active {
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.25) 0%, #05030a 100%) !important;
            border: 1.5px solid #00ffaa !important; 
            box-shadow: 0 0 22px rgba(0, 255, 170, 0.75), inset 0 0 8px rgba(0, 255, 170, 0.35) !important;
        }

        /* হাই কোয়ালিটি লোগো প্লেসমেন্ট */
        .channel-logo {
            width: 100%;
            height: 48px;
            object-fit: contain;
            background: transparent;
            display: block;
            margin: 0 auto;
            z-index: 2;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.6));
            will-change: transform;
        }

        /* ফেভারিট হার্ট আইকন */
        .fav-heart {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            z-index: 6;
            padding: 4px;
            transition: all 0.2s;
        }
        .fav-heart:hover {
            transform: scale(1.25);
            color: #ff3860;
        }
        .fav-heart.active-fav {
            color: #ff3860 !important;
            text-shadow: 0 0 8px rgba(255, 56, 96, 0.6);
        }

        /* ক্লিয়ার ও প্রফেশনাল টেক্সট বার */
        .channel-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #0a0712 0%, rgba(10, 7, 18, 0.85) 75%, rgba(10, 7, 18, 0) 100%);
            font-size: 10.5px;
            font-weight: 600;
            color: #cbd5e1;
            padding: 20px 6px 6px 6px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 3;
            letter-spacing: 0.3px;
        }
        
        .channel-item:hover .channel-name { color: #ffffff; }
        .channel-item.active .channel-name { color: #00ffaa; }

        /* মডার্ন লাইভ ইন্ডিকেটর ডট */
        .live-dot {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 6px;
            height: 6px;
            background-color: #ff3838;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3838;
            z-index: 6;
            animation: pulse-dot 1.6s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.25); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* কঙ্কাল/লোড স্কিন */
        .skeleton-card {
            height: 110px;
            background: rgba(19, 14, 33, 0.4);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .skeleton-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: loading-shimmer 1.5s infinite;
        }
        @keyframes loading-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #080a10; }
        ::-webkit-scrollbar-thumb { background: #3b2a54; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }

        /* --- RESPONSIVE FOR MOBILE PORTRAIT --- */
        @media (max-width: 900px) and (orientation: portrait) {
            body { overflow: auto; padding-top: 83px; }
            .main-container { flex-direction: column; height: auto; }
            .player-section { flex: none; width: 100%; aspect-ratio: 16 / 9; padding: 10px; }
            .playlist-section { flex: none; height: 60vh; border-left: none; border-top: 1px solid #1e2538; }
            .channel-list { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .channel-item, .skeleton-card { height: 95px; border-radius: 10px; padding: 10px; contain-intrinsic-size: 95px; }
            .channel-logo { height: 40px; }
        }

        /* --- RESPONSIVE FOR MOBILE LANDSCAPE --- */
        @media (max-width: 950px) and (orientation: landscape) {
            body { overflow: hidden; height: 100vh; width: 100vw; padding-top: 28px; }
            
            /* প্লেয়ার বাদে অন্য সেকশন হাইড থাকবে */
            header, .stream-info, .playlist-section { display: none !important; }
            
            /* নোটিশ বার স্ক্রিনের উপরে থাকবে */
            .notice-bar { display: flex !important; position: fixed; top: 0; left: 0; height: 28px; } 
            
            /* প্লেয়ার পুরো স্ক্রিন জুড়ে থাকবে */
            .main-container { height: calc(100vh - 28px); width: 100vw; }
            .player-section { flex: 1; height: 100%; width: 100vw; padding: 0; }
            .video-wrapper { height: 100%; width: 100vw; border-radius: 0; border: none; }
            video { width: 100vw !important; height: 100% !important; object-fit: fill !important; }
            
            /* ⚡ স্ক্রিন ঘোরানো অবস্থায় নেভিগেশন বাটন যাতে সুন্দর দেখায় তার স্টাইল ⚡ */
            .nav-overlay-btn {
                width: 55px;
                height: 55px;
                font-size: 18px;
                background: rgba(15, 18, 29, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.25);
            }
            .nav-prev { left: 25px; }
            .nav-next { right: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-circle-play" style="color: #4634ff;"></i> SA <span>IPTV LIVE</span>

            <i class="fa-solid fa-download"></i> Download
        </a>
        <div class="status-badge" id="totalChannels">0 Channels</div>
    </header>

    <div class="notice-bar">
        <div class="notice-title">
            <i class="fa-solid fa-bell"></i> নোটিশ:
        </div>
        <div class="notice-marquee">
            <div class="notice-container">
                <span><i class="fa-solid fa-triangle-exclamation" style="color:#ff3838;"></i> বাফারিং এড়াতে এবং ফুল এইচডি স্মুথ স্ট্রিমিং পেতে সবসময় আপনার ইন্টারনেট কানেকশন ৫ Mbps বা তার বেশি রাখুন।</span>
                <span><i class="fa-solid fa-bullhorn" style="color:#4634ff;"></i> স্বাগতম SA IPTV LIVE প্লেয়ারে! এখানে আপনি পাবেন ২৪/৭ লাইভ টিভি, স্পোর্টস এবং বিনোদন একদম ফ্রি।</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div class="player-section">
            <div class="video-wrapper" id="videoWrapper">
                <button class="nav-overlay-btn nav-prev" id="prevChannelBtn" title="Previous Channel"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="nav-overlay-btn nav-next" id="nextChannelBtn" title="Next Channel"><i class="fa-solid fa-chevron-right"></i></button>
                
                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>
            <div class="stream-info">
                <div class="now-playing">
                    <h3 id="currentChannelName"><i class="fa-solid fa-satellite-dish" style="color:#4634ff;"></i> No Channel Selected</h3>
                </div>
                <div class="player-controls-right">
                    <div class="status-badge" id="playerStatus">Ready</div>
                </div>
            </div>
        </div>

        <div class="playlist-section">
            <div class="search-box">
                <button class="category-dropdown-btn" id="categoryBtn">
                    <span id="selectedCategoryText"><i class="fa-solid fa-layer-group"></i> All Categories</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchChannel" placeholder="Search channel...">
                </div>
            </div>
            
            <div class="category-menu" id="categoryMenu"></div>
            <div class="channel-list" id="channelContainer"></div>
        </div>

    </div>

    <script>
        const video = document.getElementById("videoPlayer");
        const searchInput = document.getElementById("searchChannel");
        const channelContainer = document.getElementById("channelContainer");
        const categoryBtn = document.getElementById("categoryBtn");
        const categoryMenu = document.getElementById("categoryMenu");
        const selectedCategoryText = document.getElementById("selectedCategoryText");
        const currentChannelName = document.getElementById("currentChannelName");
        const playerStatus = document.getElementById("playerStatus");
        const totalChannelsBadge = document.getElementById("totalChannels");
        
        const videoWrapper = document.getElementById("videoWrapper");
        const prevChannelBtn = document.getElementById("prevChannelBtn");
        const nextChannelBtn = document.getElementById("nextChannelBtn");

        let hlsPlayer;
        let allChannels = [];
        let currentFilteredChannels = []; 
        let currentChannelIndex = 0; 
        let selectedCategory = "All";
        let favoriteChannels = JSON.parse(localStorage.getItem("sa_iptv_favorites")) || [];
        let hideButtonsTimeout; 
        
        const m3uUrl = "https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u";
        const defaultLogo = "https://cdn-icons-png.flaticon.com/512/716/716429.png";

        categoryBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            categoryMenu.classList.toggle("show");
        });

        document.addEventListener("click", () => {
            categoryMenu.classList.remove("show");
        });

        function showNavigationButtons() {
            clearTimeout(hideButtonsTimeout);
            prevChannelBtn.classList.add("visible");
            nextChannelBtn.classList.add("visible");
            hideButtonsTimeout = setTimeout(() => {
                prevChannelBtn.classList.remove("visible");
                nextChannelBtn.classList.remove("visible");
            }, 2000);
        }

        videoWrapper.addEventListener("mousemove", showNavigationButtons);
        videoWrapper.addEventListener("click", showNavigationButtons);
        videoWrapper.addEventListener("touchstart", showNavigationButtons, {passive: true});

        function renderSkeletons() {
            channelContainer.innerHTML = "";
            for(let i=0; i<12; i++) {
                let div = document.createElement("div");
                div.className = "skeleton-card";
                channelContainer.appendChild(div);
            }
        }

        async function fetchPlaylist() {
            renderSkeletons();
            if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Loading...";
            try {
                const response = await fetch(m3uUrl);
                const data = await response.text();
                
                setTimeout(() => {
                    const lines = data.split("\n");
                    allChannels = [];
                    let currentName = "";
                    let currentLogo = "";
                    let currentCategory = "Others";
                    let isPlaylistStarted = false;

                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i].trim();
                        if (line.startsWith("#EXTM3U")) { isPlaylistStarted = true; continue; }
                        if (!isPlaylistStarted) continue; 

                        if (line.startsWith("#EXTINF")) {
                            currentName = line.split(",")[1] || "Unknown Channel";
                            let logoMatch = line.match(/tvg-logo="(.*?)"/);
                            currentLogo = logoMatch ? logoMatch[1] : "";
                            let groupMatch = line.match(/group-title="(.*?)"/);
                            currentCategory = groupMatch ? groupMatch[1] : "Others";
                        } else if (line.startsWith("http")) {
                            allChannels.push({
                                id: btoa(unescape(encodeURIComponent(currentName + line.substring(line.length - 10)))), 
                                name: currentName,
                                logo: currentLogo,
                                category: currentCategory,
                                url: line
                            });
                        }
                    }

                    if (totalChannelsBadge) totalChannelsBadge.innerHTML = `<i class="fa-solid fa-list"></i> ${allChannels.length}`;
                    if (playerStatus) playerStatus.innerHTML = "Playlist Loaded";
                    
                    if(allChannels.length > 0) {
                        renderCategories();
                        filterAndRender();
                        currentChannelIndex = 0;
                        playStream(currentFilteredChannels[0].url, currentFilteredChannels[0].name);
                        setTimeout(() => { highlightActiveChannelInGrid(); }, 50);
                    }
                }, 400);

            } catch (error) {
                if (playerStatus) playerStatus.innerHTML = "Failed to load";
                channelContainer.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:20px;'>Failed to load stream!</div>";
            }
        }

        function renderCategories() {
            if (!categoryMenu) return;
            categoryMenu.innerHTML = "";
            const uniqueCategories = [...new Set(allChannels.map(ch => ch.category))];
            const categories = ["All", "❤️ Favorites", ...uniqueCategories];
            const fragment = document.createDocumentFragment();

            categories.forEach(category => {
                const div = document.createElement("div");
                div.className = `category-item ${category === selectedCategory ? 'active' : ''}`;
                div.textContent = category;
                div.onclick = () => {
                    selectedCategory = category;
                    updateCategoryUI(category);
                    if (searchInput) searchInput.value = ""; 
                    filterAndRender();
                };
                fragment.appendChild(div);
            });
            categoryMenu.appendChild(fragment);
        }

        function updateCategoryUI(category) {
            if (selectedCategoryText) {
                selectedCategoryText.innerHTML = `<i class="fa-solid fa-layer-group"></i> ${category === 'All' ? 'All Categories' : category}`;
            }
            if (categoryMenu) categoryMenu.classList.remove("show");
            document.querySelectorAll('.category-item').forEach(el => {
                if(el.textContent === category) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function filterAndRender() {
            const query = searchInput ? searchInput.value.toLowerCase() : "";
            currentFilteredChannels = allChannels.filter(ch => {
                let matchesCategory = false;
                if (selectedCategory === "All") matchesCategory = true;
                else if (selectedCategory === "❤️ Favorites") matchesCategory = favoriteChannels.includes(ch.id);
                else matchesCategory = ch.category === selectedCategory;
                return matchesCategory && ch.name.toLowerCase().includes(query);
            });
            renderChannels(currentFilteredChannels);
        }

        function renderChannels(channels) {
            if (!channelContainer) return;
            channelContainer.innerHTML = "";
            if(channels.length === 0) {
                channelContainer.innerHTML = "<div style='grid-column: 1 / -1; text-align:center; padding:20px; color:#556585; font-size: 12px;'>No channels found!</div>";
                return;
            }

            const fragment = document.createDocumentFragment();
            channels.forEach((channel, index) => {
                const div = document.createElement("div");
                div.className = "channel-item";
                div.setAttribute("data-index", index);
                div.setAttribute("data-id", channel.id);
                
                let imgLogo = channel.logo ? channel.logo : defaultLogo;
                let isFav = favoriteChannels.includes(channel.id) ? "fa-solid active-fav" : "fa-regular";

                div.innerHTML = `
                    <div class="live-dot"></div>
                    <i class="${isFav} fa-heart fav-heart" data-id="${channel.id}"></i>
                    <img class="channel-logo" src="${imgLogo}" loading="lazy" decoding="async" onerror="this.src='${defaultLogo}';">
                    <div class="channel-name">${channel.name}</div>
                `;

                div.querySelector(".fav-heart").onclick = (e) => {
                    e.stopPropagation(); 
                    toggleFavorite(channel.id, e.target);
                };

                div.onclick = () => {
                    currentChannelIndex = index;
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    playStream(channel.url, channel.name);
                };
                fragment.appendChild(div);
            });
            channelContainer.appendChild(fragment);
            highlightActiveChannelInGrid();
        }

        function highlightActiveChannelInGrid() {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(currentFilteredChannels[currentChannelIndex]) {
                const activeId = currentFilteredChannels[currentChannelIndex].id;
                const targetEl = document.querySelector(`.channel-item[data-id="${activeId}"]`);
                if(targetEl) {
                    targetEl.classList.add('active');
                    targetEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }
        }

        function switchChannel(direction, event) {
            if(event) event.stopPropagation(); 
            if (currentFilteredChannels.length === 0) return;

            if (direction === "next") {
                currentChannelIndex++;
                if (currentChannelIndex >= currentFilteredChannels.length) currentChannelIndex = 0; 
            } else if (direction === "prev") {
                currentChannelIndex--;
                if (currentChannelIndex < 0) currentChannelIndex = currentFilteredChannels.length - 1; 
            }

            const targetChannel = currentFilteredChannels[currentChannelIndex];
            playStream(targetChannel.url, targetChannel.name);
            highlightActiveChannelInGrid();
            showNavigationButtons();
        }

        nextChannelBtn.addEventListener("click", (e) => switchChannel("next", e));
        prevChannelBtn.addEventListener("click", (e) => switchChannel("prev", e));

        function toggleFavorite(id, iconEl) {
            if (favoriteChannels.includes(id)) {
                favoriteChannels = favoriteChannels.filter(favId => favId !== id);
                iconEl.className = "fa-regular fa-heart fav-heart";
            } else {
                favoriteChannels.push(id);
                iconEl.className = "fa-solid fa-heart fav-heart active-fav";
            }
            localStorage.setItem("sa_iptv_favorites", JSON.stringify(favoriteChannels));
            if (selectedCategory === "❤️ Favorites") filterAndRender();
        }

        function playStream(url, name) {
            if (currentChannelName) currentChannelName.innerHTML = `<i class="fa-solid fa-satellite-dish" style="color:#4634ff;"></i> ${name}`;
            if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> Connecting...";

            if (hlsPlayer) hlsPlayer.destroy();

            if (Hls.isSupported()) {
                hlsPlayer = new Hls({ enableWorker: true, maxBufferLength: 30 });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => { if (playerStatus) playerStatus.innerHTML = "Click Play Button"; });
                    if (playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-circle-play' style='color:#00ffaa'></i> Playing";
                });
                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal && playerStatus) playerStatus.innerHTML = "<i class='fa-solid fa-triangle-exclamation' style='color:#ff3838'></i> Error";
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
                if (playerStatus) playerStatus.innerHTML = "Playing";
            }
        }

        if (searchInput) {
            searchInput.addEventListener("input", () => {
                if (searchInput.value.trim() !== "") {
                    selectedCategory = "All";
                    updateCategoryUI("All");
                }
                filterAndRender();
            });
        }

        fetchPlaylist();
    </script>
</body>
</html>
